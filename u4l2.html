<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Китайские слова: новый набор</title>
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.7/dist/hanzi-writer.min.js"></script>
  <style>
    :root {
      --bg: #f7f1e8;
      --card: #fffaf2;
      --ink: #2d241d;
      --muted: #766758;
      --line: #e5d3bd;
      --accent: #b96b36;
      --shadow: 0 14px 36px rgba(58, 38, 21, 0.11);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(185, 107, 54, .17), transparent 34rem),
        linear-gradient(135deg, #fbf5ec 0%, var(--bg) 100%);
    }

    header {
      max-width: 1260px;
      margin: 0 auto;
      padding: 28px 18px 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 4vw, 50px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      max-width: 880px;
      font-size: 17px;
      line-height: 1.45;
    }

    .toolbar {
      max-width: 1260px;
      margin: 0 auto;
      padding: 0 18px 16px;
    }

    .search {
      width: min(100%, 520px);
      border: 1px solid var(--line);
      background: rgba(255, 253, 248, .95);
      border-radius: 18px;
      padding: 13px 15px;
      font-size: 15px;
      outline: none;
      box-shadow: 0 8px 22px rgba(58, 38, 21, 0.06);
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(185, 107, 54, .15);
    }

    main {
      max-width: 1260px;
      margin: 0 auto;
      padding: 0 18px 46px;
    }

    .words-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
      gap: 18px;
      align-items: start;
    }

    .word-card {
      background: rgba(255, 250, 242, .94);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .word-head {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    .hanzi-word {
      font-family: "Noto Serif SC", "Songti SC", "SimSun", serif;
      font-size: 46px;
      line-height: 1;
      min-width: 76px;
      letter-spacing: .02em;
    }

    .pinyin {
      color: var(--accent);
      font-size: 20px;
      font-weight: 850;
      line-height: 1.1;
      margin-bottom: 5px;
    }

    .ru {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
    }

    .writer-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 0;
    }

    .char-box {
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .writer-wrap {
      width: 136px;
      height: 136px;
      border-radius: 18px;
      cursor: pointer;
      touch-action: manipulation;
      background:
        linear-gradient(45deg, transparent calc(50% - 1px), rgba(185, 107, 54, .24) calc(50% - 1px), rgba(185, 107, 54, .24) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(-45deg, transparent calc(50% - 1px), rgba(185, 107, 54, .24) calc(50% - 1px), rgba(185, 107, 54, .24) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(to right, transparent calc(50% - 1px), rgba(185, 107, 54, .22) calc(50% - 1px), rgba(185, 107, 54, .22) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(to bottom, transparent calc(50% - 1px), rgba(185, 107, 54, .22) calc(50% - 1px), rgba(185, 107, 54, .22) calc(50% + 1px), transparent calc(50% + 1px));
      border: 2px solid #dcbf9d;
      background-color: #fffdf8;
      display: grid;
      place-items: center;
      overflow: hidden;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .writer-wrap:hover,
    .writer-wrap:active {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 9px 22px rgba(58, 38, 21, .12);
    }

    .char-label {
      font-family: "Noto Serif SC", "Songti SC", "SimSun", serif;
      font-size: 22px;
      color: var(--muted);
      line-height: 1;
    }

    .error {
      display: none;
      max-width: 1260px;
      margin: 0 auto 18px;
      background: #fff0f0;
      border: 1px solid #efb5b5;
      color: #8a2e2e;
      border-radius: 18px;
      padding: 12px 14px;
    }

    @media (max-width: 520px) {
      .word-card { padding: 15px; border-radius: 22px; }
      .word-head { grid-template-columns: 1fr; gap: 8px; }
      .hanzi-word { font-size: 44px; }
      .writer-wrap { width: 126px; height: 126px; }
    }

    @media print {
      body { background: white; }
      .toolbar { display: none; }
      .word-card { box-shadow: none; break-inside: avoid; }
      .writer-wrap { border-color: #999; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Китайские слова</h1>
    <p class="lead">Новый набор слов с анимацией порядка черт. Нажми на квадрат с иероглифом, чтобы запустить анимацию.</p>
  </header>

  <div class="toolbar">
    <input id="search" class="search" type="search" placeholder="Поиск: русский, pinyin или 汉字" />
  </div>

  <div id="loadError" class="error">
    Не удалось загрузить Hanzi Writer. Для анимации нужен интернет или локально подключённая библиотека.
  </div>

  <main>
    <section id="wordsGrid" class="words-grid"></section>
  </main>

  <script>
    const words = [
      { hanzi: "博物馆", pinyin: "bówùguǎn", ru: "музей" },
      { hanzi: "开", pinyin: "kāi", ru: "вести машину; открывать; выписывать рецепт" },
      { hanzi: "快", pinyin: "kuài", ru: "быстрый; быстро" },
      { hanzi: "车费", pinyin: "chēfèi", ru: "плата за проезд; стоимость проезда" },
      { hanzi: "大约", pinyin: "dàyuē", ru: "примерно; приблизительно" },
      { hanzi: "元", pinyin: "yuán", ru: "юань; китайская денежная единица" },

      { hanzi: "高速公路", pinyin: "gāosù gōnglù", ru: "автострада; шоссе; скоростная дорога" },
      { hanzi: "进入", pinyin: "jìnrù", ru: "входить; въезжать" },
      { hanzi: "离开", pinyin: "líkāi", ru: "уходить; покидать; уезжать" },
      { hanzi: "比较", pinyin: "bǐjiào", ru: "сравнительно; по сравнению" },
      { hanzi: "慢", pinyin: "màn", ru: "медленный; медленно" },

      { hanzi: "票", pinyin: "piào", ru: "билет" },
      { hanzi: "张", pinyin: "zhāng", ru: "счётное слово для плоских предметов; раскрывать" },
      { hanzi: "堵车", pinyin: "dǔchē", ru: "пробка на дороге; дорожный затор" },
      { hanzi: "有时候", pinyin: "yǒushíhou", ru: "иногда" },
      { hanzi: "晚点", pinyin: "wǎndiǎn", ru: "опаздывать; задерживаться" }
    ];

    const grid = document.getElementById("wordsGrid");
    const search = document.getElementById("search");
    const loadError = document.getElementById("loadError");

    function makeSafeId(wordIndex, charIndex) {
      return `writer-${wordIndex}-${charIndex}`;
    }

    function renderWords(filter = "") {
      const q = filter.trim().toLowerCase();
      grid.innerHTML = "";

      const filtered = words
        .map((word, index) => ({ word, index }))
        .filter(({ word }) => {
          const haystack = `${word.hanzi} ${word.pinyin} ${word.ru}`.toLowerCase();
          return !q || haystack.includes(q);
        });

      filtered.forEach(({ word, index }) => {
        const card = document.createElement("article");
        card.className = "word-card";

        const chars = [...word.hanzi];
        const writerBoxes = chars.map((char, charIndex) => {
          const id = makeSafeId(index, charIndex);
          return `
            <div class="char-box">
              <div class="writer-wrap" id="${id}" title="Нажми, чтобы анимировать ${char}"></div>
              <div class="char-label">${char}</div>
            </div>
          `;
        }).join("");

        card.innerHTML = `
          <div class="word-head">
            <div class="hanzi-word">${word.hanzi}</div>
            <div>
              <div class="pinyin">${word.pinyin}</div>
              <div class="ru">${word.ru}</div>
            </div>
          </div>
          <div class="writer-row">${writerBoxes}</div>
        `;

        grid.appendChild(card);
      });

      if (!window.HanziWriter) {
        loadError.style.display = "block";
        return;
      }

      loadError.style.display = "none";

      filtered.forEach(({ word, index }) => {
        [...word.hanzi].forEach((char, charIndex) => {
          const id = makeSafeId(index, charIndex);

          const writer = HanziWriter.create(id, char, {
            width: 128,
            height: 128,
            padding: 6,
            showOutline: true,
            showCharacter: false,
            strokeAnimationSpeed: 1,
            delayBetweenStrokes: 350,
            radicalColor: "#b96b36"
          });

          const el = document.getElementById(id);
          el.addEventListener("click", async () => {
            writer.hideCharacter();
            await writer.animateCharacter();
          });
        });
      });
    }

    search.addEventListener("input", event => renderWords(event.target.value));
    renderWords();
  </script>
</body>
</html>
